<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Domusdent Spoleto — Gestione Pazienti</title>
<meta name="theme-color" content="#0E9C94">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Domusdent CRM">
<link rel="icon" type="image/png" href="/logo.png">
<link rel="apple-touch-icon" href="/logo.png">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.23.3/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --teal:#0E9C94;--teal-d:#077B73;--teal-dd:#055B55;--teal-l:#3FBDB5;--teal-soft:#E6F6F5;--teal-soft2:#D4EFED;
  --bg:#F5FAF9;--surface:#FFFFFF;--surface-2:#F2F8F7;--surface-3:#E8F2F1;
  --line:#E1ECEA;--line-2:#CFE2E0;
  --tx:#123230;--tx-2:#46625F;--tx-3:#7B9491;--tx-4:#A7BCB9;
  --green:#15803D;--green-bg:#DCFCE7;--red:#DC2626;--red-bg:#FEE2E2;--blue:#2563EB;--blue-bg:#DBEAFE;
  --amber:#B45309;--amber-bg:#FEF3C7;--purple:#7C3AED;--purple-bg:#EDE9FE;--pink:#DB2777;--pink-bg:#FCE7F3;
  --cyan:#0E7490;--cyan-bg:#CFFAFE;--orange:#C2410C;--orange-bg:#FFEDD5;--grey:#64748B;--grey-bg:#F1F5F9;
  --r:8px;--rl:12px;--rxl:16px;
  --sh-sm:0 1px 2px rgba(18,50,48,.06);
  --sh:0 4px 14px rgba(18,50,48,.08),0 1px 3px rgba(18,50,48,.05);
  --sh-lg:0 18px 44px rgba(18,50,48,.14),0 6px 12px rgba(18,50,48,.08);
}
html,body{font-family:'Manrope',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;font-size:14px;line-height:1.45;-webkit-font-smoothing:antialiased}

.app{display:flex;min-height:100vh}
.sb{width:248px;background:var(--surface);position:fixed;height:100vh;display:flex;flex-direction:column;z-index:100;border-right:1px solid var(--line);overflow-y:auto}
.main{margin-left:248px;flex:1;padding:26px 30px;min-height:100vh;width:calc(100% - 248px)}

.logo{padding:22px 20px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:center}
.logo img{max-width:150px;height:auto;display:block}

.nav{flex:1;padding:12px 12px}
.nav-sec{font-size:9.5px;font-weight:800;letter-spacing:.15em;color:var(--tx-4);padding:14px 12px 6px;text-transform:uppercase}
.nav-i{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:8px;color:var(--tx-2);cursor:pointer;transition:all .15s;font-size:13.5px;font-weight:700;margin-bottom:2px;user-select:none;position:relative}
.nav-i:hover{background:var(--surface-2);color:var(--tx)}
.nav-i.active{background:var(--teal-soft);color:var(--teal-d)}
.nav-i.active::before{content:'';position:absolute;left:0;top:7px;bottom:7px;width:3px;background:var(--teal);border-radius:0 3px 3px 0}
.nav-i svg{width:18px;height:18px;color:var(--tx-3);flex-shrink:0}
.nav-i.active svg{color:var(--teal)}
.nav-bd{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:var(--teal);color:#fff;border-radius:10px;padding:1px 7px;font-size:10.5px;font-weight:800;line-height:1.4}
.nav-bd.alt{background:var(--surface-3);color:var(--tx-2)}

.usr{padding:14px 16px;border-top:1px solid var(--line);display:flex;align-items:center;gap:10px}
.usr-av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:12px;flex-shrink:0}
.usr-info{flex:1;min-width:0}
.usr-name{font-size:12.5px;font-weight:700;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.usr-email{font-size:10.5px;color:var(--tx-3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.usr-out{padding:6px;color:var(--tx-3);cursor:pointer;border-radius:6px}
.usr-out:hover{background:var(--red-bg);color:var(--red)}

.ph{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:24px;gap:14px;flex-wrap:wrap}
.ph-t{font-family:'Sora',sans-serif;font-size:25px;font-weight:800;color:var(--tx);letter-spacing:-.01em;line-height:1.1}
.ph-s{font-size:13px;color:var(--tx-3);margin-top:6px}
.ph-r{display:flex;gap:8px;flex-shrink:0;align-items:center;flex-wrap:wrap}

.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 15px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;transition:all .14s;border:none;font-family:'Manrope',sans-serif;white-space:nowrap;line-height:1.4}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-p{background:var(--teal);color:#fff;box-shadow:var(--sh-sm)}.btn-p:hover:not(:disabled){background:var(--teal-d);transform:translateY(-1px)}
.btn-s{background:var(--surface);color:var(--tx);border:1px solid var(--line-2)}.btn-s:hover:not(:disabled){background:var(--surface-2);border-color:var(--tx-4)}
.btn-d{background:transparent;color:var(--red);border:1px solid rgba(220,38,38,.3)}.btn-d:hover:not(:disabled){background:var(--red-bg)}
.btn-g{background:transparent;color:var(--tx-3);border:1px solid transparent}.btn-g:hover:not(:disabled){background:var(--surface-2);color:var(--tx)}
.btn-w{background:#1FA855;color:#fff}.btn-w:hover:not(:disabled){background:#1B9149}
.btn-sm{padding:6px 11px;font-size:12px;border-radius:6px;gap:5px}
.btn-lg{padding:11px 19px;font-size:14px}
.btn svg{width:15px;height:15px;flex-shrink:0}

.card{background:var(--surface);border-radius:var(--rl);box-shadow:var(--sh-sm);padding:20px;border:1px solid var(--line)}
.card-t{font-family:'Sora',sans-serif;font-size:14.5px;font-weight:700;margin-bottom:14px;color:var(--tx)}

.fg{margin-bottom:15px}.fg:last-child{margin-bottom:0}
.flbl{display:block;font-size:11px;font-weight:700;color:var(--tx-2);margin-bottom:6px;letter-spacing:.02em}
.fc{width:100%;padding:10px 12px;border:1.5px solid var(--line-2);border-radius:8px;font-size:13.5px;font-family:'Manrope',sans-serif;color:var(--tx);transition:border-color .14s;background:var(--surface);outline:none}
.fc:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(14,156,148,.12)}
.fc::placeholder{color:var(--tx-4)}
select.fc{cursor:pointer}
textarea.fc{resize:vertical;min-height:80px;font-family:'Manrope',sans-serif}
.frow{display:grid;gap:13px}
.c2{grid-template-columns:1fr 1fr}.c3{grid-template-columns:1fr 1fr 1fr}

.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px}
.sc{background:var(--surface);border-radius:var(--rl);box-shadow:var(--sh-sm);padding:19px;border:1px solid var(--line);position:relative}
.si{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:13px}
.si svg{width:20px;height:20px}
.sv{font-family:'Sora',sans-serif;font-size:27px;font-weight:800;color:var(--tx);line-height:1;letter-spacing:-.01em}
.sl{font-size:12px;color:var(--tx-3);margin-top:6px;font-weight:600}

.tw{overflow-x:auto;background:var(--surface);border-radius:var(--rl);border:1px solid var(--line);box-shadow:var(--sh-sm)}
.tbl{width:100%;border-collapse:collapse;font-size:13.5px}
.tbl th{text-align:left;padding:12px 15px;background:var(--surface-2);color:var(--tx-3);font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.07em;border-bottom:1px solid var(--line)}
.tbl td{padding:14px 15px;border-bottom:1px solid var(--line);vertical-align:middle;color:var(--tx-2)}
.tbl tr:last-child td{border-bottom:none}
.tbl tbody tr{cursor:pointer;transition:background .12s}
.tbl tbody tr:hover td{background:var(--surface-2)}

.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:800;letter-spacing:.01em;white-space:nowrap}

.kb{display:grid;grid-template-columns:repeat(8,minmax(225px,1fr));gap:14px;overflow-x:auto;padding-bottom:8px}
.kb-col{background:var(--surface);border-radius:var(--rl);min-height:340px;display:flex;flex-direction:column;border:1px solid var(--line);overflow:hidden;box-shadow:var(--sh-sm)}
.kb-col-top{height:4px;background:var(--col-c,#94A3B8)}
.kb-col-h{display:flex;align-items:center;justify-content:space-between;padding:12px 14px 10px;background:var(--surface-2);border-bottom:1px solid var(--line)}
.kb-col-t{display:flex;align-items:center;gap:8px;font-size:11.5px;font-weight:800;color:var(--tx-2);text-transform:uppercase;letter-spacing:.06em}
.kb-col-n{background:var(--surface-3);color:var(--tx-2);border-radius:10px;padding:1px 8px;font-size:11px;font-weight:800}
.kb-cards{padding:10px;display:flex;flex-direction:column;gap:8px;flex:1;overflow-y:auto;max-height:calc(100vh - 290px)}
.kb-card{background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:11px 12px;cursor:grab;transition:all .13s;box-shadow:var(--sh-sm)}
.kb-card:hover{border-color:var(--teal-l);box-shadow:var(--sh);transform:translateY(-1px)}
.kb-card.drag{opacity:.45}
.kb-name{font-size:13px;font-weight:800;color:var(--tx);margin-bottom:4px}
.kb-meta{font-size:11.5px;color:var(--tx-3);display:flex;align-items:center;gap:5px;margin-bottom:2px}
.kb-col.over{outline:2px dashed var(--teal-l);outline-offset:-4px}

.ovl{position:fixed;inset:0;background:rgba(18,50,48,.45);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px;animation:fade .18s ease;backdrop-filter:blur(2px)}
.mdl{background:var(--surface);border-radius:var(--rxl);box-shadow:var(--sh-lg);width:100%;max-width:560px;max-height:92vh;overflow-y:auto;animation:pop .2s ease;border:1px solid var(--line)}
.mdl.wide{max-width:760px}
.mdl-h{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--surface);z-index:5;border-radius:var(--rxl) var(--rxl) 0 0}
.mdl-t{font-family:'Sora',sans-serif;font-size:16.5px;font-weight:800;color:var(--tx)}
.mdl-x{padding:7px;border-radius:7px;color:var(--tx-3);cursor:pointer;display:flex}
.mdl-x:hover{background:var(--surface-2);color:var(--tx)}
.mdl-b{padding:22px}
.mdl-f{display:flex;justify-content:flex-end;gap:9px;padding:15px 22px;border-top:1px solid var(--line);position:sticky;bottom:0;background:var(--surface);border-radius:0 0 var(--rxl) var(--rxl)}

.dt-h{display:flex;align-items:flex-start;gap:14px;margin-bottom:18px}
.dt-av{width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:17px;flex-shrink:0;font-family:'Sora',sans-serif}
.dt-n{font-family:'Sora',sans-serif;font-size:19px;font-weight:800;color:var(--tx);line-height:1.2}
.dt-s{font-size:12.5px;color:var(--tx-3);margin-top:3px}
.act-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}
.tl{position:relative;padding-left:22px}
.tl::before{content:'';position:absolute;left:7px;top:6px;bottom:6px;width:2px;background:var(--line)}
.tl-i{position:relative;padding-bottom:14px}
.tl-i::before{content:'';position:absolute;left:-19px;top:5px;width:9px;height:9px;border-radius:50%;background:var(--teal-l);border:2px solid var(--surface);box-shadow:0 0 0 1.5px var(--line-2)}
.tl-tx{font-size:13px;color:var(--tx-2);line-height:1.5}
.tl-m{font-size:11px;color:var(--tx-4);margin-top:2px;font-weight:600}

.tpl{display:flex;flex-direction:column;gap:7px}
.tpl-i{border:1.5px solid var(--line-2);border-radius:9px;padding:10px 12px;cursor:pointer;transition:all .13s;background:var(--surface)}
.tpl-i:hover{border-color:var(--teal);background:var(--teal-soft)}
.tpl-n{font-size:12.5px;font-weight:800;color:var(--tx);margin-bottom:3px}
.tpl-p{font-size:11.5px;color:var(--tx-3);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

.cal-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.cal-m{font-family:'Sora',sans-serif;font-size:17px;font-weight:800;color:var(--tx);text-transform:capitalize}
.cal-g{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.cal-dh{text-align:center;font-size:10.5px;font-weight:800;color:var(--tx-4);text-transform:uppercase;letter-spacing:.06em;padding:5px 0}
.cal-d{background:var(--surface);border:1px solid var(--line);border-radius:9px;min-height:96px;padding:6px;cursor:pointer;transition:all .12s;display:flex;flex-direction:column;gap:3px;overflow:hidden}
.cal-d:hover{border-color:var(--teal-l);box-shadow:var(--sh-sm)}
.cal-d.off{background:var(--surface-2);opacity:.55;cursor:default}
.cal-d.today{border-color:var(--teal);box-shadow:0 0 0 1.5px var(--teal)}
.cal-dn{font-size:11.5px;font-weight:800;color:var(--tx-2)}
.cal-d.today .cal-dn{color:var(--teal-d)}
.cal-bk{font-size:10.5px;font-weight:700;padding:2.5px 6px;border-radius:5px;background:var(--teal-soft);color:var(--teal-dd);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;border-left:3px solid var(--teal)}
.cal-bk.provv{background:var(--amber-bg);color:var(--amber);border-left-color:var(--amber)}
.cal-bk.disd{background:var(--grey-bg);color:var(--grey);border-left-color:var(--grey);text-decoration:line-through}

.login{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(160deg,var(--teal-soft) 0%,var(--bg) 45%,#fff 100%);padding:20px}
.login-c{background:var(--surface);border-radius:18px;box-shadow:var(--sh-lg);padding:38px 34px;width:100%;max-width:400px;border:1px solid var(--line)}
.login-lg{display:flex;flex-direction:column;align-items:center;gap:12px;margin-bottom:26px;text-align:center}
.login-lg img{max-width:170px}

.ld{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;min-height:100vh;color:var(--tx-3);font-weight:600}
.spin{width:30px;height:30px;border:3px solid var(--line-2);border-top-color:var(--teal);border-radius:50%;animation:rot .8s linear infinite}
.empty{text-align:center;padding:46px 20px;color:var(--tx-3)}
.empty svg{width:38px;height:38px;color:var(--tx-4);margin-bottom:10px}
.empty-t{font-weight:800;color:var(--tx-2);font-size:14.5px;margin-bottom:4px}
.empty-s{font-size:12.5px}

.bd-mob{display:none}
.seg{display:inline-flex;background:var(--surface-2);border:1px solid var(--line);border-radius:9px;padding:3px;gap:2px}
.seg-i{padding:6px 12px;border-radius:7px;font-size:12px;font-weight:700;color:var(--tx-3);cursor:pointer;white-space:nowrap}
.seg-i.act{background:var(--surface);color:var(--teal-d);box-shadow:var(--sh-sm)}

@keyframes fade{from{opacity:0}to{opacity:1}}
@keyframes pop{from{opacity:0;transform:scale(.96) translateY(8px)}to{opacity:1;transform:none}}
@keyframes rot{to{transform:rotate(360deg)}}
@keyframes slideIn{from{opacity:0;transform:translateX(18px)}to{opacity:1;transform:none}}

@media(max-width:980px){
  .sb{transform:translateX(-100%);transition:transform .22s ease}
  .sb.open{transform:none}
  .main{margin-left:0;width:100%;padding:18px 14px 86px}
  .sg{grid-template-columns:1fr 1fr}
  .c2,.c3{grid-template-columns:1fr}
  .bd-mob{display:flex;position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--line);z-index:200;padding:6px 4px calc(6px + env(safe-area-inset-bottom))}
  .bd-mob-i{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;font-weight:700;color:var(--tx-3);padding:6px 2px;border-radius:8px;cursor:pointer}
  .bd-mob-i.act{color:var(--teal-d)}
  .bd-mob-i svg{width:20px;height:20px}
  .cal-d{min-height:64px}
  .kb{grid-template-columns:repeat(8,240px)}
}

/* ---- Pipeline v2: più visibile ---- */
.kb{display:flex;gap:14px;overflow-x:auto;padding-bottom:12px;align-items:stretch}
.kb-col{flex:0 0 272px;min-height:420px}
.kb-col-h{padding:13px 15px 11px}
.kb-col-t{font-size:12.5px;letter-spacing:.05em}
.kb-col-n{color:#fff;font-size:11.5px;padding:2px 9px}
.kb-card{padding:13px 14px;border-radius:11px;border-width:1.5px}
.kb-name{font-size:14.5px;margin-bottom:6px}
.kb-meta{font-size:12px;margin-bottom:3px;gap:6px}
.kb-tr{display:inline-block;font-size:10.5px;font-weight:800;padding:2.5px 8px;border-radius:12px;margin-bottom:7px}
.kb-appt{display:flex;align-items:center;gap:6px;background:var(--purple-bg);color:var(--purple);font-size:11.5px;font-weight:800;padding:5px 8px;border-radius:7px;margin:5px 0 3px;line-height:1.3}
.kb-empty{font-size:12px;color:var(--tx-4);text-align:center;padding:26px 8px;border:1.5px dashed var(--line-2);border-radius:10px;font-weight:600}
.kb-foot{padding:9px 15px;border-top:1px solid var(--line);font-size:12px;font-weight:800;color:var(--tx-2);background:var(--surface-2)}

/* ---- Scheda paziente con menu laterale (stile GHL) ---- */
.lt{display:flex;min-height:400px}
.lt-side{width:172px;flex-shrink:0;border-right:1px solid var(--line);padding-right:10px;display:flex;flex-direction:column;gap:3px}
.lt-tab{display:flex;align-items:center;gap:9px;padding:10px 11px;border-radius:8px;font-size:13px;font-weight:700;color:var(--tx-2);cursor:pointer;transition:all .13s;user-select:none}
.lt-tab:hover{background:var(--surface-2);color:var(--tx)}
.lt-tab.act{background:var(--teal-soft);color:var(--teal-d)}
.lt-tab svg{width:16px;height:16px;flex-shrink:0}
.lt-tab .n{margin-left:auto;background:var(--surface-3);border-radius:10px;padding:1px 7px;font-size:10.5px;font-weight:800;color:var(--tx-3)}
.lt-tab.act .n{background:var(--teal);color:#fff}
.lt-body{flex:1;min-width:0;padding-left:18px}
.note-card{background:var(--surface-2);border:1px solid var(--line);border-left:3px solid var(--teal);border-radius:9px;padding:12px 14px;margin-bottom:9px}
.note-card.first{border-left-color:var(--amber);background:var(--amber-bg)}
.note-tx{font-size:13.5px;color:var(--tx);line-height:1.55;white-space:pre-wrap}
.note-m{font-size:10.5px;color:var(--tx-3);margin-top:6px;font-weight:800;text-transform:uppercase;letter-spacing:.04em}

/* ---- Agenda v2: vista giorno ---- */
.cal-more{font-size:10.5px;color:var(--teal-d);font-weight:800;background:var(--teal-soft);border-radius:5px;padding:2.5px 6px;text-align:center}
.day-i{display:flex;gap:13px;align-items:center;padding:13px 14px;border:1.5px solid var(--line);border-radius:11px;margin-bottom:9px;cursor:pointer;transition:all .12s;background:var(--surface)}
.day-i:hover{border-color:var(--teal-l);box-shadow:var(--sh-sm)}
.day-i.disd{opacity:.55}
.day-t{font-family:'Sora',sans-serif;font-weight:800;font-size:15px;color:var(--teal-d);min-width:56px;line-height:1.2}
.day-t small{display:block;font-size:10px;color:var(--tx-4);font-weight:700}
.day-n{font-size:14px;font-weight:800;color:var(--tx)}
.day-s{font-size:12px;color:var(--tx-3);margin-top:2px}

@media(max-width:980px){
  .lt{flex-direction:column}
  .lt-side{width:100%;flex-direction:row;overflow-x:auto;border-right:none;border-bottom:1px solid var(--line);padding:0 0 8px}
  .lt-tab{white-space:nowrap}
  .lt-body{padding-left:0;padding-top:14px}
  .kb-col{flex:0 0 252px}
}

/* ---- Autocomplete paziente in agenda ---- */
.ac{position:relative}
.ac-dd{position:absolute;top:100%;left:0;right:0;background:var(--surface);border:1.5px solid var(--line-2);border-radius:10px;box-shadow:var(--sh-lg);z-index:60;max-height:215px;overflow-y:auto;margin-top:4px}
.ac-i{padding:9px 12px;cursor:pointer;display:flex;gap:10px;align-items:center;border-bottom:1px solid var(--line)}
.ac-i:last-child{border-bottom:none}
.ac-i:hover{background:var(--teal-soft)}
.ac-link{display:inline-flex;align-items:center;gap:6px;background:var(--teal-soft);color:var(--teal-d);border-radius:7px;padding:4px 9px;font-size:11.5px;font-weight:800;margin-top:6px}
.ac-link svg{cursor:pointer}
.qa{border:1px solid var(--line);border-radius:9px;padding:10px 12px;margin-bottom:8px;background:var(--surface-2)}
.qa-q{font-size:11px;font-weight:800;color:var(--tx-3);text-transform:uppercase;letter-spacing:.03em;margin-bottom:3px}
.qa-a{font-size:13.5px;font-weight:700;color:var(--tx)}
</style>

const fmt=n=>new Intl.NumberFormat('it-IT',{style:'currency',currency:'EUR',minimumFractionDigits:0,maximumFractionDigits:0}).format(+n||0);
const fmtDate=d=>{if(!d)return '-';const dt=new Date(d);return dt.toLocaleDateString('it-IT',{day:'2-digit',month:'short',year:'numeric'})};
const fmtRel=d=>{
  if(!d)return '';
  const diff=(Date.now()-new Date(d).getTime())/1000;
  if(diff<60)return 'ora';
  if(diff<3600)return Math.floor(diff/60)+'m fa';
  if(diff<86400)return Math.floor(diff/3600)+'h fa';
  if(diff<604800)return Math.floor(diff/86400)+'g fa';
  return fmtDate(d);
};
const isoDay=d=>{const x=new Date(d);return `${x.getFullYear()}-${String(x.getMonth()+1).padStart(2,'0')}-${String(x.getDate()).padStart(2,'0')}`};
const cleanPhone=p=>(p||'').replace(/[^\d+]/g,'');
const waLink=(p,t='')=>`https://wa.me/${cleanPhone(p).replace(/^\+/,'')}${t?'?text='+encodeURIComponent(t):''}`;
const treatName=k=>TREAT_MAP[k]?.l||k||'—';
/* Valore opportunità: preventivo reale se c'è, altrimenti stima dal trattamento (est=true) */
const leadValue=l=>(+l.value>0)?{v:+l.value,est:false}:{v:TREAT_MAP[l.treatment]?.def||0,est:true};
const fillTpl=(t,l)=>{
  const firstName=(l.full_name||'').split(' ')[0]||'';
  const tp=l.treatment&&l.treatment!=='altro'?` riguardo al trattamento ${treatName(l.treatment)}`:'';
  return (t||'')
    .replace(/\{nome\}/g,firstName)
    .replace(/\{trattamento_part\}/g,tp)
    .replace(/\{trattamento\}/g,treatName(l.treatment))
    .replace(/\{studio\}/g,STUDIO.name)
    .replace(/\{full_name\}/g,l.full_name||'');
};
const initials=n=>(n||'').split(' ').map(w=>w[0]||'').slice(0,2).join('').toUpperCase()||'??';
const avatarColor=s=>{const cs=['#0E9C94','#2563EB','#7C3AED','#15803D','#B45309','#DB2777','#0E7490','#C2410C'];let h=0;for(let i=0;i<(s||'').length;i++)h=s.charCodeAt(i)+((h<<5)-h);return cs[Math.abs(h)%cs.length]};

const Badge=({k})=>{const s=STATUS_MAP[k]||STATUSES[0];return <span className="badge" style={{background:s.bg,color:s.fg}}>{s.l}</span>};

const useToast=()=>{
  const [t,setT]=useState(null);

};

const LeadForm=({lead,onSave,onClose})=>{
  const [f,setF]=useState({
    full_name:lead?.full_name||'',
    phone:lead?.phone||'',
    email:lead?.email||'',
    source:lead?.source||'manual',
    campaign:lead?.campaign||'',
    treatment:lead?.treatment||'allon4',
    status:lead?.status||'nuovo',
    value:lead?.value||'',
    note:lead?.note||''
  });
  const [busy,setBusy]=useState(false);
  const upd=(k,v)=>setF(p=>({...p,[k]:v}));
  const submit=async()=>{
    if(!f.full_name.trim()){alert('Inserisci il nome del paziente');return}
    setBusy(true);
    const ok=await onSave({...f,id:lead?.id,value:f.value===''?null:+f.value});
    setBusy(false);
    if(ok)onClose();
  };
  return(
    <div className="ovl" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="mdl">
        <div className="mdl-h"><div className="mdl-t">{lead?'Modifica paziente':'Nuovo paziente'}</div><div className="mdl-x" onClick={onClose}><I n="x"/></div></div>
        <div className="mdl-b">
          <div className="fg"><label className="flbl">Nome e cognome *</label>
            <input className="fc" value={f.full_name} onChange={e=>upd('full_name',e.target.value)} placeholder="Mario Rossi"/></div>
          <div className="frow c2 fg">
            <div><label className="flbl">Telefono</label>
              <input className="fc" value={f.phone} onChange={e=>upd('phone',e.target.value)} placeholder="+39 333 1234567"/></div>
            <div><label className="flbl">Email</label>
              <input className="fc" type="email" value={f.email} onChange={e=>upd('email',e.target.value)} placeholder="mario@email.it"/></div>
          </div>
          <div className="frow c2 fg">
            <div><label className="flbl">Da dove arriva</label>
              <select className="fc" value={f.source} onChange={e=>upd('source',e.target.value)}>
                {SOURCES.map(s=><option key={s.k} value={s.k}>{s.l}</option>)}
              </select></div>
            <div><label className="flbl">Pubblicità di provenienza (facoltativo)</label>
              <input className="fc" value={f.campaign} onChange={e=>upd('campaign',e.target.value)} placeholder="es. AllOn4 Spoleto Giugno"/></div>
          </div>
          <div className="frow c2 fg">
            <div><label className="flbl">Trattamento di interesse</label>
              <select className="fc" value={f.treatment} onChange={e=>upd('treatment',e.target.value)}>
                {TREATMENTS.map(t=><option key={t.k} value={t.k}>{t.l}</option>)}
              </select></div>
            <div><label className="flbl">Fase</label>
              <select className="fc" value={f.status} onChange={e=>upd('status',e.target.value)}>
                {STATUSES.map(s=><option key={s.k} value={s.k}>{s.l}</option>)}
              </select></div>
          </div>
          <div className="fg"><label className="flbl">Valore del preventivo (€) — lascia vuoto se non ancora fatto</label>
            <input className="fc" type="number" value={f.value} onChange={e=>upd('value',e.target.value)} placeholder="es. 6500"/></div>
          <div className="fg"><label className="flbl">Note</label>
            <textarea className="fc" value={f.note} onChange={e=>upd('note',e.target.value)} placeholder="Cosa ha detto il paziente, esigenze, orari preferiti…"/></div>
        </div>
        <div className="mdl-f">
          <button className="btn btn-g" onClick={onClose}>Annulla</button>
          <button className="btn btn-p" onClick={submit} disabled={busy}>{busy?'Salvataggio…':'Salva'}</button>
        </div>
      </div>
    </div>
  );
};

const WaModal=({lead,onClose,onSent})=>{
  const [sel,setSel]=useState(null);
  const [text,setText]=useState('');
  const choose=t=>{setSel(t.id);setText(fillTpl(t.text,lead))};
  const send=()=>{
    window.open(waLink(lead.phone,text),'_blank');
    onSent(text);
    onClose();
  };
  return(
    <div className="ovl" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="mdl">
        <div className="mdl-h"><div className="mdl-t">Messaggio WhatsApp a {(lead.full_name||'').split(' ')[0]}</div><div className="mdl-x" onClick={onClose}><I n="x"/></div></div>
        <div className="mdl-b">
          {!sel?(
            <div className="tpl">
              {TEMPLATES.map(t=>(
                <div key={t.id} className="tpl-i" onClick={()=>choose(t)}>
                  <div className="tpl-n">{t.name}</div>

            <>
              <div className="fg"><label className="flbl">Anteprima — puoi modificare prima di inviare</label>

          )}

        {sel&&<div className="mdl-f">

   DASHBOARD

const Dashboard=({leads,appts,onLeadClick})=>{
  const now=new Date();
  const monthStart=new Date(now.getFullYear(),now.getMonth(),1);
  const monthLeads=leads.filter(l=>new Date(l.created_at)>=monthStart);
  const newCount=leads.filter(l=>l.status==='nuovo').length;
  const visits=leads.filter(l=>['appuntamento','visitato','preventivo','accettato'].includes(l.status));
  const won=leads.filter(l=>l.status==='accettato');
  const conv=leads.length?Math.round(won.length/leads.length*100):0;
  const wonValue=won.reduce((s,l)=>s+(+l.value||0),0);
  const upcoming=appts.filter(a=>a.date>=isoDay(now)&&a.status!=='disdetto').sort((a,b)=>(a.date+a.time).localeCompare(b.date+b.time)).slice(0,6);
  const recent=[...leads].sort((a,b)=>new Date(b.created_at)-new Date(a.created_at)).slice(0,7);
  const byTreat=TREATMENTS.map(t=>({...t,n:leads.filter(l=>l.treatment===t.k).length})).filter(t=>t.n>0).sort((a,b)=>b.n-a.n);
  const stats=[
    {ic:'bolt', l:'Pazienti da chiamare', v:newCount,           bg:'var(--blue-bg)',  c:'var(--blue)'},
    {ic:'users',l:'Nuovi questo mese',  v:monthLeads.length,  bg:'var(--teal-soft)',c:'var(--teal-d)'},
    {ic:'tooth',l:'In percorso visita', v:visits.length,      bg:'var(--purple-bg)',c:'var(--purple)'},
    {ic:'euro', l:`Piani accettati (${conv}% conv.)`,v:fmt(wonValue),bg:'var(--green-bg)',c:'var(--green)'}
  ];
  return(
    <>
      <div className="ph">
        <div><div className="ph-t">Riepilogo</div><div className="ph-s">La situazione di oggi — {STUDIO.name}</div></div>
      </div>
      <div className="sg">
        {stats.map((s,i)=>(
          <div key={i} className="sc">
            <div className="si" style={{background:s.bg,color:s.c}}><I n={s.ic}/></div>
            <div className="sv">{s.v}</div><div className="sl">{s.l}</div>
          </div>
        ))}
      </div>
      <div className="frow c2" style={{alignItems:'start'}}>
        <div className="card">
          <div className="card-t">Ultimi arrivati</div>
          {recent.length===0?<div className="empty"><I n="inbox"/><div className="empty-t">Ancora nessuna richiesta</div><div className="empty-s">Le richieste dalle pubblicità Facebook compariranno qui da sole.</div></div>:
            recent.map(l=>(
              <div key={l.id} onClick={()=>onLeadClick(l)} style={{display:'flex',alignItems:'center',gap:10,padding:'9px 4px',borderBottom:'1px solid var(--line)',cursor:'pointer'}}>
                <div className="usr-av" style={{background:avatarColor(l.full_name),width:32,height:32,fontSize:11}}>{initials(l.full_name)}</div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:13,fontWeight:800,color:'var(--tx)',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{l.full_name}</div>
                  <div style={{fontSize:11,color:'var(--tx-3)'}}>{treatName(l.treatment)} · {fmtRel(l.created_at)}</div>
                </div>
                <Badge k={l.status}/>
              </div>
            ))}
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:14}}>
          <div className="card">
            <div className="card-t">Prossimi appuntamenti</div>
            {upcoming.length===0?<div className="empty" style={{padding:'18px 8px'}}><div className="empty-s">Nessun appuntamento in agenda.</div></div>:
              upcoming.map(a=>(
                <div key={a.id} style={{display:'flex',alignItems:'center',gap:10,padding:'8px 4px',borderBottom:'1px solid var(--line)'}}>
                  <div style={{background:'var(--teal-soft)',color:'var(--teal-dd)',borderRadius:8,padding:'5px 9px',fontSize:11,fontWeight:800,textAlign:'center',minWidth:58}}>
                    {new Date(a.date+'T00:00').toLocaleDateString('it-IT',{day:'2-digit',month:'short'})}<br/>{a.time?.slice(0,5)}
                  </div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:13,fontWeight:800,color:'var(--tx)'}}>{a.patient_name}</div>
                    <div style={{fontSize:11,color:'var(--tx-3)'}}>{APPT_MAP[a.type]?.l||a.type}{a.doctor?` · ${a.doctor}`:''}</div>
                  </div>
                </div>
              ))}
          </div>
          <div className="card">
            <div className="card-t">Trattamenti richiesti</div>
            <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
              {byTreat.map(t=>(
                <span key={t.k} className="badge" style={{background:'var(--surface-3)',color:t.c,fontSize:11.5,padding:'5px 10px'}}>{t.l} · {t.n}</span>
              ))}
              {byTreat.length===0&&<div className="empty-s" style={{color:'var(--tx-3)'}}>Nessun dato ancora.</div>}
            </div>
          </div>
        </div>
      </div>
    </>
  );
};

/* ============================================================
   LISTA LEAD
   ============================================================ */
const LeadsList=({leads,onCardClick,onAdd,search,setSearch,sFilter,setSFilter,srcFilter,setSrcFilter,trFilter,setTrFilter})=>{
  const filtered=useMemo(()=>leads.filter(l=>{
    if(sFilter!=='all'&&l.status!==sFilter)return false;
    if(srcFilter!=='all'&&l.source!==srcFilter)return false;
    if(trFilter!=='all'&&l.treatment!==trFilter)return false;
    if(search){
      const q=search.toLowerCase();
      return (l.full_name||'').toLowerCase().includes(q)||(l.phone||'').includes(q)||(l.email||'').toLowerCase().includes(q)||(l.campaign||'').toLowerCase().includes(q);
    }
    return true;
  }).sort((a,b)=>new Date(b.created_at)-new Date(a.created_at)),[leads,search,sFilter,srcFilter,trFilter]);
  return(
    <>
      <div className="ph">
        <div><div className="ph-t">Pazienti</div><div className="ph-s">{filtered.length} pazienti in lista {sFilter!=='all'?`· ${STATUS_MAP[sFilter]?.l}`:''}</div></div>
        <div className="ph-r"><button className="btn btn-p" onClick={onAdd}><I n="plus"/>Nuovo paziente</button></div>
      </div>
      <div style={{display:'flex',gap:9,marginBottom:16,flexWrap:'wrap'}}>
        <div style={{position:'relative',flex:'1 1 220px',maxWidth:340}}>
          <span style={{position:'absolute',left:11,top:'50%',transform:'translateY(-50%)',color:'var(--tx-4)'}}><I n="search" s={15}/></span>
          <input className="fc" style={{paddingLeft:34}} value={search} onChange={e=>setSearch(e.target.value)} placeholder="Cerca nome o numero di telefono…"/>
        </div>
        <select className="fc" style={{width:'auto'}} value={sFilter} onChange={e=>setSFilter(e.target.value)}>
          <option value="all">Tutte le fasi</option>
          {STATUSES.map(s=><option key={s.k} value={s.k}>{s.l}</option>)}
        </select>
        <select className="fc" style={{width:'auto'}} value={srcFilter} onChange={e=>setSrcFilter(e.target.value)}>
          <option value="all">Tutte le provenienze</option>
          {SOURCES.map(s=><option key={s.k} value={s.k}>{s.l}</option>)}
        </select>
        <select className="fc" style={{width:'auto'}} value={trFilter} onChange={e=>setTrFilter(e.target.value)}>
          <option value="all">Tutti i trattamenti</option>
          {TREATMENTS.map(t=><option key={t.k} value={t.k}>{t.l}</option>)}
        </select>
      </div>
      {filtered.length===0?(
        <div className="card"><div className="empty"><I n="inbox"/><div className="empty-t">Nessun paziente trovato</div><div className="empty-s">Prova a cambiare i filtri oppure aggiungi un paziente a mano.</div></div></div>
      ):(
        <div className="tw">
          <table className="tbl">
            <thead><tr><th>Paziente</th><th>Contatti</th><th>Trattamento</th><th>Da dove arriva</th><th>Fase</th><th>Valore</th><th>Quando</th></tr></thead>
            <tbody>
              {filtered.map(l=>{
                const src=SOURCE_MAP[l.source];
                return(
                  <tr key={l.id} onClick={()=>onCardClick(l)}>
                    <td><div style={{display:'flex',alignItems:'center',gap:9}}>
                      <div className="usr-av" style={{background:avatarColor(l.full_name),width:30,height:30,fontSize:10.5}}>{initials(l.full_name)}</div>
                      <b style={{color:'var(--tx)'}}>{l.full_name}</b></div></td>
                    <td><div style={{fontSize:12.5}}>{l.phone||'—'}</div><div style={{fontSize:11,color:'var(--tx-4)'}}>{l.email||''}</div></td>
                    <td style={{fontSize:12.5}}>{treatName(l.treatment)}</td>
                    <td>{src&&<span style={{color:src.c,fontWeight:800,fontSize:12}}>{src.l}</span>}{l.campaign&&<div style={{fontSize:10.5,color:'var(--tx-4)'}}>{l.campaign}</div>}</td>
                    <td><Badge k={l.status}/></td>
                    <td style={{fontWeight:800,color:l.value>0?'var(--tx)':'var(--tx-4)'}}>{l.value>0?fmt(l.value):'—'}</td>
                    <td style={{fontSize:12,color:'var(--tx-3)'}}>{fmtRel(l.created_at)}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      )}
    </>
  );
};

/* ============================================================
   PIPELINE (kanban drag & drop) — v2 più leggibile
   ============================================================ */
const nextApptOf=(appts,leadId)=>{
  const t=isoDay(new Date());
  return appts.filter(a=>a.lead_id===leadId&&a.status!=='disdetto'&&a.date>=t)
    .sort((a,b)=>(a.date+(a.time||'')).localeCompare(b.date+(b.time||'')))[0];
};

const Pipeline=({leads,appts,onCardClick,onStatusChange})=>{
  const [drag,setDrag]=useState(null);
  const [over,setOver]=useState(null);
  return(
    <>
      <div className="ph">
        <div><div className="ph-t">Percorso pazienti</div><div className="ph-s">Tieni premuta la scheda e spostala nella colonna giusta · clicca per aprirla · ~ = valore stimato, in verde il preventivo vero</div></div>
      </div>
      <div className="kb">
        {STATUSES.map(st=>{
          const items=leads.filter(l=>l.status===st.k).sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));
          const colVal=items.reduce((s,l)=>s+leadValue(l).v,0);
          return(
            <div key={st.k} className={`kb-col ${over===st.k?'over':''}`}
              onDragOver={e=>{e.preventDefault();setOver(st.k)}}
              onDragLeave={()=>setOver(o=>o===st.k?null:o)}
              onDrop={()=>{if(drag&&drag.status!==st.k)onStatusChange(drag.id,st.k);setDrag(null);setOver(null)}}>
              <div className="kb-col-top" style={{background:st.c}}></div>
              <div className="kb-col-h" style={{background:st.c+'12'}}>
                <div className="kb-col-t" style={{color:st.c}}>
                  <span style={{width:9,height:9,borderRadius:'50%',background:st.c,display:'inline-block'}}></span>{st.l}
                </div>
                <span className="kb-col-n" style={{background:st.c}}>{items.length}</span>
              </div>
              <div className="kb-cards">
                {items.map(l=>{
                  const na=nextApptOf(appts,l.id);
                  const tr=TREAT_MAP[l.treatment];
                  return(
                    <div key={l.id} className={`kb-card ${drag?.id===l.id?'drag':''}`} draggable
                      onDragStart={()=>setDrag(l)} onDragEnd={()=>{setDrag(null);setOver(null)}}
                      onClick={()=>onCardClick(l)}>
                      <div className="kb-name">{l.full_name}</div>
                      {tr&&<span className="kb-tr" style={{color:tr.c,background:tr.c+'14'}}>{tr.l}</span>}
                      {l.phone&&<div className="kb-meta"><I n="phone" s={13}/>{l.phone}</div>}
                      {na&&<div className="kb-appt"><I n="calendar" s={13}/>Appuntamento fissato per {apptShort(na)}</div>}
                      <div className="kb-meta" style={{justifyContent:'space-between',marginTop:6,marginBottom:0}}>
                        <span style={{color:'var(--tx-4)',fontSize:11}}>{fmtRel(l.created_at)}</span>
                        {(()=>{const {v,est}=leadValue(l);
                          return v>0&&<b style={{fontSize:13.5,color:est?'var(--tx-3)':'var(--teal-d)'}} title={est?'Valore stimato dal trattamento':'Preventivo presentato'}>{est?'~':''}{fmt(v)}</b>})()}
                      </div>
                    </div>
                  );
                })}
                {items.length===0&&<div className="kb-empty">Trascina qui un paziente</div>}
              </div>
              {colVal>0&&<div className="kb-foot">Possibile incasso: {fmt(colVal)}</div>}
            </div>
          );
        })}
      </div>
    </>
  );
};

/* ============================================================
   FORM APPUNTAMENTO
   ============================================================ */
const ApptForm=({appt,leads,presetLead,presetDate,onSave,onDelete,onClose})=>{
  const [f,setF]=useState({
    lead_id:appt?.lead_id||presetLead?.id||'',
    patient_name:appt?.patient_name||presetLead?.full_name||'',
    type:appt?.type||'prima_visita',
    date:appt?.date||presetDate||isoDay(new Date()),
    time:appt?.time?.slice(0,5)||'09:00',
    duration:appt?.duration||60,
    doctor:appt?.doctor||'',
    status:appt?.status||'confermato',
    note:appt?.note||''
  });
  const [busy,setBusy]=useState(false);
  const upd=(k,v)=>setF(p=>({...p,[k]:v}));
  const [acOpen,setAcOpen]=useState(false);
  const acMatches=useMemo(()=>{
    const q=(f.patient_name||'').toLowerCase().trim();
    if(!q||f.lead_id)return [];
    return leads.filter(l=>(l.full_name||'').toLowerCase().includes(q)||(l.phone||'').includes(q)).slice(0,6);
  },[f.patient_name,f.lead_id,leads]);
  const pickLead=l=>{
    setF(p=>({...p,lead_id:l.id,patient_name:l.full_name}));
    setAcOpen(false);
  };
  const linkedLead=f.lead_id?leads.find(x=>x.id===f.lead_id):null;
  const submit=async()=>{
    if(!f.patient_name.trim()){alert('Inserisci il nome del paziente');return}
    setBusy(true);
    const ok=await onSave({...f,id:appt?.id,lead_id:f.lead_id||null});
    setBusy(false);
    if(ok)onClose();
  };
  return(
    <div className="ovl" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="mdl">
        <div className="mdl-h"><div className="mdl-t">{appt?'Modifica appuntamento':'Nuovo appuntamento'}</div><div className="mdl-x" onClick={onClose}><I n="x"/></div></div>
        <div className="mdl-b">
          <div className="fg ac"><label className="flbl">Nome paziente * <span style={{fontWeight:600,color:'var(--tx-4)',textTransform:'none'}}>— scrivi il nome: se il paziente è già in lista compare qui sotto</span></label>
            <input className="fc" value={f.patient_name}
              onChange={e=>{setF(p=>({...p,patient_name:e.target.value,lead_id:''}));setAcOpen(true)}}
              onFocus={()=>setAcOpen(true)}
              onBlur={()=>setTimeout(()=>setAcOpen(false),180)}
              placeholder="Inizia a scrivere il nome…"/>
            {acOpen&&acMatches.length>0&&(
              <div className="ac-dd">
                {acMatches.map(l=>(
                  <div key={l.id} className="ac-i" onMouseDown={()=>pickLead(l)}>
                    <div className="usr-av" style={{background:avatarColor(l.full_name),width:28,height:28,fontSize:10}}>{initials(l.full_name)}</div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:13,fontWeight:800,color:'var(--tx)'}}>{l.full_name}</div>
                      <div style={{fontSize:11,color:'var(--tx-3)'}}>{l.phone||'—'} · {treatName(l.treatment)}</div>
                    </div>
                    <Badge k={l.status}/>
                  </div>
                ))}
              </div>
            )}
            {linkedLead?(
              <span className="ac-link"><I n="check" s={13}/>Collegato a: {linkedLead.full_name}
                <span onClick={()=>setF(p=>({...p,lead_id:''}))} title="Scollega"><I n="x" s={13}/></span></span>
            ):(
              f.patient_name.trim()&&!acOpen&&<span style={{fontSize:11,color:'var(--tx-4)',fontWeight:700,display:'inline-block',marginTop:6}}>Paziente nuovo, non ancora in lista</span>
            )}
          </div>
          <div className="frow c2 fg">
            <div><label className="flbl">Tipo</label>
              <select className="fc" value={f.type} onChange={e=>upd('type',e.target.value)}>
                {APPT_TYPES.map(t=><option key={t.k} value={t.k}>{t.l}</option>)}
              </select></div>
            <div><label className="flbl">Dottore / Operatore</label>
              <input className="fc" value={f.doctor} onChange={e=>upd('doctor',e.target.value)} placeholder="Dott. …"/></div>
          </div>
          <div className="frow c3 fg">
            <div><label className="flbl">Data</label>
              <input className="fc" type="date" value={f.date} onChange={e=>upd('date',e.target.value)}/></div>
            <div><label className="flbl">Ora</label>
              <input className="fc" type="time" value={f.time} onChange={e=>upd('time',e.target.value)}/></div>
            <div><label className="flbl">Durata (min)</label>
              <input className="fc" type="number" step="15" value={f.duration} onChange={e=>upd('duration',+e.target.value||60)}/></div>
          </div>
          <div className="fg"><label className="flbl">Fase</label>
            <select className="fc" value={f.status} onChange={e=>upd('status',e.target.value)}>
              <option value="confermato">Confermato</option>
              <option value="provvisorio">Provvisorio</option>
              <option value="disdetto">Disdetto</option>
            </select></div>
          <div className="fg"><label className="flbl">Note</label>
            <textarea className="fc" value={f.note} onChange={e=>upd('note',e.target.value)} placeholder="Es. portare TAC, paziente ansioso, sedazione…"/></div>
        </div>
        <div className="mdl-f">
          {appt&&<button className="btn btn-d" style={{marginRight:'auto'}} onClick={()=>{if(confirm('Eliminare questo appuntamento?')){onDelete(appt.id);onClose()}}}><I n="trash"/>Elimina</button>}
          <button className="btn btn-g" onClick={onClose}>Annulla</button>
          <button className="btn btn-p" onClick={submit} disabled={busy}>{busy?'Salvataggio…':'Salva'}</button>
        </div>
      </div>
    </div>
  );
};

/* ============================================================
   AGENDA — vista mese + vista giorno completa
   ============================================================ */
const apptBadgeStyle=st=>st==='confermato'?{background:'var(--green-bg)',color:'var(--green)'}
  :st==='provvisorio'?{background:'var(--amber-bg)',color:'var(--amber)'}
  :{background:'var(--grey-bg)',color:'var(--grey)'};

const DayModal=({date,appts,onAdd,onEditAppt,onClose})=>{
  const list=appts.filter(a=>a.date===date).sort((a,b)=>(a.time||'').localeCompare(b.time||''));
  const label=new Date(date+'T00:00').toLocaleDateString('it-IT',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  return(
    <div className="ovl" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="mdl">
        <div className="mdl-h">
          <div className="mdl-t" style={{textTransform:'capitalize'}}>{label}</div>
          <div className="mdl-x" onClick={onClose}><I n="x"/></div>
        </div>
        <div className="mdl-b">
          {list.length===0?(
            <div className="empty" style={{padding:'26px 10px'}}><I n="calendar"/><div className="empty-t">Giornata libera</div><div className="empty-s">Nessun appuntamento. Aggiungi il primo con il pulsante qui sotto.</div></div>
          ):(
            <>
              <div style={{fontSize:12,fontWeight:800,color:'var(--tx-3)',marginBottom:10}}>{list.length} appuntament{list.length===1?'o':'i'} · clicca per modificare</div>
              {list.map(a=>(
                <div key={a.id} className={`day-i ${a.status==='disdetto'?'disd':''}`} onClick={()=>onEditAppt(a)}>
                  <div className="day-t">{(a.time||'').slice(0,5)}<small>{a.duration} min</small></div>
                  <div style={{flex:1,minWidth:0}}>
                    <div className="day-n">{a.patient_name}</div>
                    <div className="day-s">{APPT_MAP[a.type]?.l||a.type}{a.doctor?` · ${a.doctor}`:''}{a.note?` · ${a.note}`:''}</div>
                  </div>
                  <span className="badge" style={apptBadgeStyle(a.status)}>{a.status}</span>
                </div>
              ))}
            </>
          )}
        </div>
        <div className="mdl-f">
          <button className="btn btn-g" onClick={onClose}>Chiudi</button>
          <button className="btn btn-p" onClick={onAdd}><I n="plus"/>Aggiungi appuntamento</button>
        </div>
      </div>
    </div>
  );
};

const Agenda=({appts,leads,onSave,onDelete,toast})=>{
  const [cur,setCur]=useState(()=>{const d=new Date();return new Date(d.getFullYear(),d.getMonth(),1)});
  const [dayOpen,setDayOpen]=useState(null);  // data ISO della vista giorno
  const [editing,setEditing]=useState(null);  // appuntamento da modificare
  const [creating,setCreating]=useState(null);// data ISO per nuovo appuntamento
  const today=isoDay(new Date());
  const monthLabel=cur.toLocaleDateString('it-IT',{month:'long',year:'numeric'});
  const firstDow=(cur.getDay()+6)%7;
  const daysIn=new Date(cur.getFullYear(),cur.getMonth()+1,0).getDate();
  const cells=[];
  for(let i=0;i<firstDow;i++)cells.push(null);
  for(let d=1;d<=daysIn;d++)cells.push(new Date(cur.getFullYear(),cur.getMonth(),d));
  const apptsOf=d=>appts.filter(a=>a.date===isoDay(d)).sort((a,b)=>(a.time||'').localeCompare(b.time||''));
  return(
    <>
      <div className="ph">
        <div><div className="ph-t">Agenda</div><div className="ph-s">Clicca su un giorno per vedere tutti gli appuntamenti e aggiungerne di nuovi</div></div>
        <div className="ph-r">
          <button className="btn btn-s" onClick={()=>{setCur(()=>{const d=new Date();return new Date(d.getFullYear(),d.getMonth(),1)});setDayOpen(today)}}>Oggi</button>
          <button className="btn btn-p" onClick={()=>setCreating(today)}><I n="plus"/>Nuovo appuntamento</button>
        </div>
      </div>
      <div className="card">
        <div className="cal-h">
          <button className="btn btn-s btn-sm" onClick={()=>setCur(new Date(cur.getFullYear(),cur.getMonth()-1,1))}><I n="arrowLeft"/></button>
          <div className="cal-m">{monthLabel}</div>
          <button className="btn btn-s btn-sm" onClick={()=>setCur(new Date(cur.getFullYear(),cur.getMonth()+1,1))}><I n="arrowRight"/></button>
        </div>
        <div className="cal-g">
          {['Lun','Mar','Mer','Gio','Ven','Sab','Dom'].map(d=><div key={d} className="cal-dh">{d}</div>)}
          {cells.map((d,i)=>d===null?<div key={'e'+i} className="cal-d off"></div>:(
            <div key={i} className={`cal-d ${isoDay(d)===today?'today':''}`} onClick={()=>setDayOpen(isoDay(d))}>
              <div className="cal-dn">{d.getDate()}</div>
              {apptsOf(d).slice(0,3).map(a=>(
                <div key={a.id} className={`cal-bk ${a.status==='provvisorio'?'provv':a.status==='disdetto'?'disd':''}`}
                  onClick={e=>{e.stopPropagation();setEditing(a)}}>
                  {a.time?.slice(0,5)} {a.patient_name}
                </div>
              ))}
              {apptsOf(d).length>3&&<div className="cal-more">+{apptsOf(d).length-3} — vedi tutti</div>}
            </div>
          ))}
        </div>
      </div>
      {dayOpen&&!editing&&!creating&&<DayModal date={dayOpen} appts={appts}
        onAdd={()=>setCreating(dayOpen)}
        onEditAppt={a=>setEditing(a)}
        onClose={()=>setDayOpen(null)}/>}
      {(editing||creating)&&<ApptForm appt={editing} leads={leads} presetDate={creating}
        onSave={onSave} onDelete={onDelete}
        onClose={()=>{setEditing(null);setCreating(null)}}/>}
    </>
  );
};

/* ============================================================
   ACCESSO
   ============================================================ */
const Login=()=>{
  const [email,setEmail]=useState('');
  const [pwd,setPwd]=useState('');
  const [busy,setBusy]=useState(false);
  const [err,setErr]=useState('');
  const submit=async()=>{
    if(!email||!pwd)return;
    setBusy(true);setErr('');
    const {error}=await sb.auth.signInWithPassword({email,password:pwd});
    if(error){setErr('Email o password non corretti');setBusy(false)}
  };
  return(
    <div className="login">
      <div className="login-c">
        <div className="login-lg">
          <img src={LOGO} alt="Domusdent Spoleto"/>
          <div style={{fontSize:10,color:'var(--tx-3)',letterSpacing:'.2em',fontWeight:800}}>GESTIONE PAZIENTI</div>
        </div>
        {err&&<div style={{background:'var(--red-bg)',color:'var(--red)',padding:'9px 12px',borderRadius:8,fontSize:12.5,marginBottom:14,fontWeight:700}}>{err}</div>}
        <div className="fg">
          <label className="flbl">Email</label>
          <input className="fc" type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="segreteria@domusdent.it" onKeyDown={e=>e.key==='Enter'&&submit()}/>
        </div>
        <div className="fg">
          <label className="flbl">Password</label>
          <input className="fc" type="password" value={pwd} onChange={e=>setPwd(e.target.value)} placeholder="••••••••" onKeyDown={e=>e.key==='Enter'&&submit()}/>
        </div>
        <button className="btn btn-p btn-lg" style={{width:'100%',justifyContent:'center',marginTop:8}} onClick={submit} disabled={busy||!email||!pwd}>
          {busy?'Accesso…':'Entra'}
        </button>
        <div style={{fontSize:11,color:'var(--tx-4)',textAlign:'center',marginTop:18,lineHeight:1.5}}>
          Gli account si creano da<br/>Supabase → Authentication → Users
        </div>
      </div>
    </div>
  );
};

/* ============================================================
   APP
   ============================================================ */
const App=()=>{
  const [session,setSession]=useState(undefined);
  const [loading,setLoading]=useState(true);
  const [view,setView]=useState('dash');
  const [sbOpen,setSbOpen]=useState(false);

  const [leads,setLeads]=useState([]);
  const [activities,setActivities]=useState([]);
  const [appts,setAppts]=useState([]);

  const [selected,setSelected]=useState(null);
  const [showForm,setShowForm]=useState(false);
  const [editingLead,setEditingLead]=useState(null);
  const [quickApptLead,setQuickApptLead]=useState(null);
  const [editingAppt,setEditingAppt]=useState(null);

  const [search,setSearch]=useState('');
  const [sFilter,setSFilter]=useState('all');
  const [srcFilter,setSrcFilter]=useState('all');
  const [trFilter,setTrFilter]=useState('all');

  const [toast,showToast]=useToast();

  /* ---- ACCESSO ---- */
  useEffect(()=>{
    sb.auth.getSession().then(({data})=>setSession(data.session));
    const {data:{subscription}}=sb.auth.onAuthStateChange((_e,s)=>setSession(s));
    return ()=>subscription.unsubscribe();
  },[]);

  /* ---- CARICAMENTO DATI ---- */
  const loadData=useCallback(async()=>{
    setLoading(true);
    const [l,a,ap]=await Promise.all([
      sb.from('leads').select('*').order('created_at',{ascending:false}),
      sb.from('activities').select('*').order('created_at',{ascending:false}).limit(500),
      sb.from('appointments').select('*').order('date',{ascending:true})
    ]);
    if(l.data)setLeads(l.data);
    if(a.data)setActivities(a.data);
    if(ap.data)setAppts(ap.data);
    setLoading(false);
  },[]);
  useEffect(()=>{if(session)loadData()},[session,loadData]);

  /* ---- TEMPO REALE: i pazienti dalle pubblicità Facebook compaiono da soli ---- */
  useEffect(()=>{
    if(!session)return;
    const ch=sb.channel('leads-rt')
      .on('postgres_changes',{event:'INSERT',schema:'public',table:'leads'},payload=>{
        setLeads(p=>p.find(x=>x.id===payload.new.id)?p:[payload.new,...p]);
        showToast('🦷 Nuovo paziente da Facebook: '+(payload.new.full_name||'senza nome'),'lead');
      })
      .subscribe();
    return ()=>{sb.removeChannel(ch)};
  },[session]);

  /* ---- PAZIENTI ---- */
  const saveLead=async l=>{
    const row={full_name:l.full_name,phone:l.phone,email:l.email,source:l.source,campaign:l.campaign||null,
      treatment:l.treatment,status:l.status,value:l.value,note:l.note||null};
    if(l.id){
      const {error}=await sb.from('leads').update(row).eq('id',l.id);
      if(error){showToast('Errore: '+error.message,'err');return false}
      setLeads(p=>p.map(x=>x.id===l.id?{...x,...row}:x));
      if(selected?.id===l.id)setSelected(s=>({...s,...row}));
      showToast('Scheda aggiornata');
    }else{
      const {data,error}=await sb.from('leads').insert([row]).select().single();
      if(error){showToast('Errore: '+error.message,'err');return false}
      if(data)setLeads(p=>p.find(x=>x.id===data.id)?p:[data,...p]);
      showToast('Paziente aggiunto');
    }
    return true;
  };
  const deleteLead=async id=>{
    if(!confirm('Eliminare definitivamente questo paziente e tutte le sue note?'))return;
    const {error}=await sb.from('leads').delete().eq('id',id);
    if(error){showToast('Errore eliminazione','err');return}
    setLeads(p=>p.filter(x=>x.id!==id));
    setSelected(null);
    showToast('Paziente eliminato');
  };
  const changeStatus=async(id,status)=>{
    setLeads(p=>p.map(x=>x.id===id?{...x,status}:x));
    if(selected?.id===id)setSelected(s=>({...s,status}));
    const {error}=await sb.from('leads').update({status}).eq('id',id);
    if(error){showToast('Errore aggiornamento','err');loadData();return}
    addActivity(id,'status','Fase → '+(STATUS_MAP[status]?.l||status));
  };
  const addActivity=async(lead_id,type,content)=>{
    const row={lead_id,type,content,created_by:session?.user?.id||null};
    const {data,error}=await sb.from('activities').insert([row]).select().single();
    if(!error&&data)setActivities(p=>[data,...p]);
  };

  /* ---- APPUNTAMENTI ---- */
  const saveAppt=async a=>{
    const row={lead_id:a.lead_id,patient_name:a.patient_name,type:a.type,date:a.date,time:a.time,
      duration:a.duration,doctor:a.doctor||null,status:a.status,note:a.note||null};
    if(a.id){
      const {error}=await sb.from('appointments').update(row).eq('id',a.id);
      if(error){showToast('Errore: '+error.message,'err');return false}
      setAppts(p=>p.map(x=>x.id===a.id?{...x,...row}:x));
      showToast('Appuntamento aggiornato');
    }else{
      const {data,error}=await sb.from('appointments').insert([row]).select().single();
      if(error){showToast('Errore: '+error.message,'err');return false}
      if(data)setAppts(p=>[...p,data]);
      showToast('Appuntamento salvato');
      if(a.lead_id){
        addActivity(a.lead_id,'appt',`${APPT_MAP[a.type]?.l||a.type} fissato per ${fmtDate(a.date)} ore ${a.time}`);
        const l=leads.find(x=>x.id===a.lead_id);
        if(l&&['nuovo','contattato','norisposta'].includes(l.status))changeStatus(a.lead_id,'appuntamento');
      }
    }
    return true;
  };
  const deleteAppt=async id=>{
    const {error}=await sb.from('appointments').delete().eq('id',id);
    if(error){showToast('Errore eliminazione','err');return}
    setAppts(p=>p.filter(x=>x.id!==id));
    showToast('Appuntamento eliminato');
  };

  if(session===undefined)return <div className="ld"><div className="spin"></div>Caricamento…</div>;
  if(session===null)return <Login/>;

  const newLeads=leads.filter(l=>l.status==='nuovo').length;
  const nav=[
    {k:'dash', ic:'home',    l:'Riepilogo'},
    {k:'leads',ic:'users',   l:'Pazienti', bd:leads.length||null},
    {k:'pipe', ic:'kanban',  l:'Percorso'},
    {k:'cal',  ic:'calendar',l:'Agenda'}
  ];
  const liveSel=selected?leads.find(l=>l.id===selected.id)||selected:null;

  return(
    <div className="app">
      {sbOpen&&<div className="ovl" onClick={()=>setSbOpen(false)} style={{zIndex:99}}></div>}
      <div className={`sb ${sbOpen?'open':''}`}>
        <div className="logo"><img src={LOGO} alt="Domusdent Spoleto"/></div>
        <div className="nav">
          <div className="nav-sec">Gestione</div>
          {nav.map(n=>(
            <div key={n.k} className={`nav-i ${view===n.k?'active':''}`} onClick={()=>{setView(n.k);setSbOpen(false)}}>
              <I n={n.ic}/>{n.l}
              {n.bd&&<span className="nav-bd alt">{n.bd}</span>}
              {n.k==='leads'&&newLeads>0&&<span className="nav-bd">{newLeads}</span>}
            </div>
          ))}
          <div className="nav-sec">Studio</div>
          <a className="nav-i" href={'tel:'+STUDIO.phone} style={{textDecoration:'none'}}><I n="phone"/>Chiama lo studio</a>
          <a className="nav-i" href={STUDIO.site} target="_blank" rel="noreferrer" style={{textDecoration:'none'}}><I n="globe"/>Sito web</a>
        </div>
        <div className="usr">
          <div className="usr-av" style={{background:avatarColor(session.user.email)}}>{initials(session.user.email)}</div>
          <div className="usr-info">
            <div className="usr-name">{session.user.email?.split('@')[0]}</div>
            <div className="usr-email">{session.user.email}</div>
          </div>
          <div className="usr-out" onClick={()=>sb.auth.signOut()} title="Esci"><I n="logout" s={16}/></div>
        </div>
      </div>

      <div className="main">
        {loading?(
          <div className="ld" style={{minHeight:'70vh'}}><div className="spin"></div>Caricamento dati…</div>
        ):(
          <>
            {view==='dash'&&<Dashboard leads={leads} appts={appts} onLeadClick={setSelected}/>}
            {view==='leads'&&<LeadsList leads={leads} onCardClick={setSelected}
              onAdd={()=>{setEditingLead(null);setShowForm(true)}}
              search={search} setSearch={setSearch} sFilter={sFilter} setSFilter={setSFilter}
              srcFilter={srcFilter} setSrcFilter={setSrcFilter} trFilter={trFilter} setTrFilter={setTrFilter}/>}
            {view==='pipe'&&<Pipeline leads={leads} appts={appts} onCardClick={setSelected} onStatusChange={changeStatus}/>}
            {view==='cal'&&<Agenda appts={appts} leads={leads} onSave={saveAppt} onDelete={deleteAppt} toast={showToast}/>}
          </>
        )}
      </div>

      <div className="bd-mob">
        {nav.map(n=>(
          <div key={n.k} className={`bd-mob-i ${view===n.k?'act':''}`} onClick={()=>setView(n.k)}>
            <I n={n.ic} s={20}/>{n.l}
          </div>
        ))}
        <div className="bd-mob-i" onClick={()=>{setEditingLead(null);setShowForm(true)}}><I n="plus" s={20}/>Nuovo</div>
      </div>

      {showForm&&<LeadForm lead={editingLead} onSave={saveLead} onClose={()=>{setShowForm(false);setEditingLead(null)}}/>}
      {liveSel&&<LeadDetail lead={liveSel} activities={activities} appts={appts}
        onClose={()=>setSelected(null)}
        onEdit={()=>{setEditingLead(liveSel);setShowForm(true);setSelected(null)}}
        onDelete={()=>deleteLead(liveSel.id)}
        onStatusChange={changeStatus}
        onAddActivity={addActivity}
        onQuickAppt={l=>setQuickApptLead(l)}
        onEditAppt={a=>setEditingAppt(a)}
        toast={showToast}/>}
      {quickApptLead&&<ApptForm presetLead={quickApptLead} leads={leads}
        onSave={saveAppt} onDelete={deleteAppt}
        onClose={()=>setQuickApptLead(null)}/>}
      {editingAppt&&<ApptForm appt={editingAppt} leads={leads}
        onSave={saveAppt} onDelete={deleteAppt}
        onClose={()=>setEditingAppt(null)}/>}
      <Toast t={toast}/>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
